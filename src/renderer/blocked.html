<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Licencia Expirada — Control de Lavandería</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .blocked-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0c4a6e 100%);
      padding: 32px;
    }
    .blocked-content {
      text-align: center;
      max-width: 480px;
    }
    /* Sad washing machine SVG */
    .sad-washer {
      width: 160px;
      height: 160px;
      margin: 0 auto 32px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .blocked-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 16px;
    }
    .blocked-message {
      font-size: 1.05rem;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .blocked-contact {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .blocked-contact-title {
      font-size: 0.85rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .blocked-contact-info {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .blocked-retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 32px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      transition: all 0.3s;
    }
    .blocked-retry-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.35);
    }
    .blocked-retry-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .activation-loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .activation-loading.show {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">Control de Lavandería</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn" onclick="window.api.app.minimize()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
      </button>
      <button class="titlebar-btn close" onclick="window.api.app.close()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="blocked-page">
    <div class="blocked-content">
      <!-- Sad Washing Machine Icon -->
      <svg class="sad-washer" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Machine body -->
        <rect x="30" y="20" width="140" height="170" rx="16" stroke="#64748b" stroke-width="4" fill="rgba(255,255,255,0.04)"/>
        <!-- Top panel -->
        <line x1="30" y1="60" x2="170" y2="60" stroke="#64748b" stroke-width="3"/>
        <!-- Buttons on top -->
        <circle cx="55" cy="40" r="7" stroke="#64748b" stroke-width="2.5"/>
        <circle cx="80" cy="40" r="7" stroke="#64748b" stroke-width="2.5"/>
        <rect x="120" y="33" width="35" height="14" rx="4" stroke="#64748b" stroke-width="2.5"/>
        <!-- Door circle -->
        <circle cx="100" cy="130" r="45" stroke="#64748b" stroke-width="4" fill="rgba(14,165,233,0.06)"/>
        <circle cx="100" cy="130" r="35" stroke="#475569" stroke-width="2" stroke-dasharray="4 4"/>
        <!-- Sad face inside drum -->
        <circle cx="86" cy="122" r="4" fill="#94a3b8"/>
        <circle cx="114" cy="122" r="4" fill="#94a3b8"/>
        <path d="M86 144 C92 138, 108 138, 114 144" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" fill="none"/>
        <!-- Tear drops -->
        <path d="M86 128 C86 132, 83 136, 83 136" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
        <path d="M114 128 C114 132, 117 136, 117 136" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
        <!-- Feet -->
        <rect x="42" y="186" width="20" height="8" rx="3" fill="#475569"/>
        <rect x="138" y="186" width="20" height="8" rx="3" fill="#475569"/>
      </svg>
      
      <h1 class="blocked-title">Su licencia ha expirado</h1>
      
      <p class="blocked-message">
        Su suscripción ha vencido y el acceso al sistema se encuentra deshabilitado.<br>
        Comuníquese con su proveedor para volver a activarla y continuar usando la aplicación.
      </p>

      <div class="blocked-contact">
        <div class="blocked-contact-title">Soporte y Reactivación</div>
        <div class="blocked-contact-info">Foxy Studios</div>
      </div>

      <button id="retryBtn" class="blocked-retry-btn" onclick="retryValidation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
          <path d="M16 21v-5h5"/>
        </svg>
        Reintentar Validación
      </button>
      
      <div id="loadingIndicator" class="activation-loading" style="color: rgba(255,255,255,0.7); margin-top: 16px;">
        <div class="spinner spinner-sm" style="border-color: rgba(255,255,255,0.2); border-top-color: white;"></div>
        <span>Verificando estado...</span>
      </div>
    </div>
  </div>

  <script>
    const retryBtn = document.getElementById('retryBtn');
    const loadingEl = document.getElementById('loadingIndicator');

    async function retryValidation() {
      retryBtn.disabled = true;
      loadingEl.classList.add('show');

      try {
        const result = await window.api.license.validate();
        
        if (result.valid) {
          await window.api.app.loadPage('index.html');
        } else {
          const originalHTML = retryBtn.innerHTML;
          retryBtn.innerHTML = '<span style="color: #ef4444;">Licencia aún suspendida</span>';
          
          setTimeout(() => {
            retryBtn.innerHTML = originalHTML;
            retryBtn.disabled = false;
          }, 2500);
        }
      } catch (err) {
        retryBtn.disabled = false;
      } finally {
        loadingEl.classList.remove('show');
      }
    }
  </script>
</body>
</html>
