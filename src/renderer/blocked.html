<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Servicio Suspendido — Control de Lavandería</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">Control de Lavandería</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn" onclick="window.api.app.minimize()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
      </button>
      <button class="titlebar-btn close" onclick="window.api.app.close()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="blocked-page">
    <div class="blocked-content">
      <svg class="blocked-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      
      <h1 class="blocked-title">Servicio Suspendido</h1>
      
      <p class="blocked-message">
        Su licencia ha sido suspendida temporalmente.<br>
        Para reactivar su servicio y continuar utilizando el sistema, por favor comuníquese con su proveedor.
      </p>

      <div class="blocked-contact">
        <div class="blocked-contact-title">Soporte y Reactivación</div>
        <div class="blocked-contact-info">Foxy Studios</div>
      </div>

      <button id="retryBtn" class="blocked-retry-btn" onclick="retryValidation()">
        <span style="display: flex; align-items: center; justify-content: center; gap: 8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 21v-5h5"/>
          </svg>
          Reintentar Validación
        </span>
      </button>
      
      <div id="loadingIndicator" class="activation-loading" style="color: rgba(255,255,255,0.7); margin-top: 16px;">
        <div class="spinner spinner-sm" style="border-color: rgba(255,255,255,0.2); border-top-color: white;"></div>
        <span>Verificando estado...</span>
      </div>
    </div>
  </div>

  <script>
    const retryBtn = document.getElementById('retryBtn');
    const loadingEl = document.getElementById('loadingIndicator');

    async function retryValidation() {
      retryBtn.disabled = true;
      loadingEl.classList.add('show');

      try {
        const result = await window.api.license.validate();
        
        if (result.valid) {
          // Si ya es válida, recargar la app
          await window.api.app.loadPage('index.html');
        } else {
          // Si sigue suspendida, mostrar un toast (necesitaríamos implementar el toast aquí, o simplemente cambiar el texto del botón por un segundo)
          const originalText = retryBtn.innerHTML;
          retryBtn.innerHTML = 'Sigue suspendida';
          retryBtn.style.color = '#ef4444';
          retryBtn.style.borderColor = '#ef4444';
          
          setTimeout(() => {
            retryBtn.innerHTML = originalText;
            retryBtn.style.color = '';
            retryBtn.style.borderColor = '';
            retryBtn.disabled = false;
          }, 2000);
        }
      } catch (err) {
        // Ignorar errores de red aquí, el usuario debe intentar de nuevo
        retryBtn.disabled = false;
      } finally {
        loadingEl.classList.remove('show');
      }
    }
  </script>
</body>
</html>
