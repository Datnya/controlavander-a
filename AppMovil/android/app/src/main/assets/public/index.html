<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Lavandería</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/mobile.css">
  <script src="./js/dexie.js"></script>
  <script src="./js/mobile-api.js"></script>
  <script>
    // Load app scale immediately to prevent flickering
    (async function loadScale() {
      try {
        const res = await window.api.settings.get('app_scale');
        if (res && res.success && res.data && res.data !== 'normal') {
          document.documentElement.classList.add('scale-' + res.data);
        }
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <!-- Titlebar (hidden on mobile via CSS) -->
  <div class="titlebar">
    <span class="titlebar-title" id="appTitle">Control de Lavandería</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn" onclick="window.api.app.minimize()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
      </button>
      <button class="titlebar-btn" id="maximizeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
      </button>
      <button class="titlebar-btn close" onclick="window.api.app.close()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="app-layout">
    <!-- Sidebar (se convierte en bottom tab bar en móvil) -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="assets/logo-v2.png" alt="Logo Lavandería" id="sidebarLogo" onerror="this.style.display='none'">
        <h2 style="color: white; display: none;" id="sidebarLogoText">Foxy Studios</h2>
      </div>

      <div class="sidebar-nav">
        <div class="sidebar-section-title">Principal</div>
        
        <div class="nav-item active" data-route="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          Dashboard
        </div>
        
        <div class="nav-item" data-route="new-order">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
          Nuevo
        </div>
        
        <div class="nav-item" data-route="orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Pedidos
          <span class="nav-badge" id="activeOrdersBadge" style="display: none;">0</span>
        </div>
        
        <div class="nav-item" data-route="clients">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Clientes
        </div>
        
        <div class="nav-item" data-route="history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Historial
        </div>
        
        <div class="nav-item" data-route="reports">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
          Reportes
        </div>
        
        <div class="nav-item" data-route="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Config
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-version" id="appVersion">v1.0.0</div>
      </div>
    </aside>

    <!-- Main View -->
    <main class="main-content">
      <!-- Header -->
      <header class="header" style="background: var(--color-gray-900); padding: 12px 16px;">
        <div class="header-left" style="display: flex; align-items: center;">
          <img src="assets/logo-v2.png" alt="Logo" style="height: 68px; margin-right: 14px; object-fit: contain;">
          <div>
            <h2 class="header-title" id="pageTitle" style="margin-bottom: 2px; font-size: 18px; color: white;">Dashboard</h2>
          </div>
        </div>
        <div class="header-right">
          <button class="btn btn-primary btn-sm" onclick="app.navigate('new-order')" style="font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            Nuevo Pedido
          </button>
        </div>
      </header>

      <!-- Page Content Container (Injected via JS) -->
      <div id="pageContainer" class="page-content">
        <!-- Content will load here based on the route -->
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Core Scripts -->
  <script src="js/utils/format.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/app.js"></script>
  
  <!-- Page Scripts -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/clients.js"></script>
  <script src="js/pages/orders.js"></script>
  <script src="js/pages/new-order.js"></script>
  <script src="js/pages/order-detail.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/pages/receipt.js"></script>


</body>
</html>
