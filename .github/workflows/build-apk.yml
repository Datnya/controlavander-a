name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Necesario para que el workflow pueda crear Releases con el APK adjunto.
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    # Capacitor enlaza los modulos nativos de Android desde node_modules
    # (ver AppMovil/android/capacitor.settings.gradle). Sin este paso Gradle
    # falla con "Configuring project ':capacitor-android' without an existing
    # directory". node_modules esta en .gitignore, asi que hay que instalarlo.
    - name: Install npm dependencies (Capacitor)
      working-directory: ./AppMovil
      run: npm install

    # cap sync regenera los proyectos generados que estan en .gitignore
    # (capacitor-cordova-android-plugins, capacitor.settings.gradle, etc.) y
    # copia la carpeta web (www) hacia los assets nativos de Android.
    - name: Sync Capacitor (Android)
      working-directory: ./AppMovil
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      working-directory: ./AppMovil/android
      run: chmod +x gradlew

    - name: Build APK with Gradle
      working-directory: ./AppMovil/android
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lavanderia-App-v2
        path: AppMovil/android/app/build/outputs/apk/debug/app-debug.apk

    # Renombra el APK a un nombre amigable para la descarga del cliente.
    - name: Rename APK
      run: cp AppMovil/android/app/build/outputs/apk/debug/app-debug.apk ControlLavanderia-Movil.apk

    # Publica un Release con link de descarga PERMANENTE y PUBLICO (el cliente
    # no necesita cuenta ni token de GitHub para bajar el instalador). La
    # activacion por licencia sigue protegiendo la app: descargarla no la activa.
    - name: Publicar Release con el APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: movil-v1.0.${{ github.run_number }}
        name: Control de Lavanderia - Movil (build ${{ github.run_number }})
        body: |
          APK de la aplicacion movil Control de Lavanderia.
          Descarga el archivo ControlLavanderia-Movil.apk e instalalo en el celular.
          La app requiere activacion con un codigo de licencia valido.
        files: ControlLavanderia-Movil.apk
        make_latest: true
