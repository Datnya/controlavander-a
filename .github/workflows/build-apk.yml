name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Capacitor enlaza los modulos nativos de Android desde node_modules
    # (ver AppMovil/android/capacitor.settings.gradle). Sin este paso Gradle
    # falla con "Configuring project ':capacitor-android' without an existing
    # directory". node_modules esta en .gitignore, asi que hay que instalarlo.
    - name: Install npm dependencies (Capacitor)
      working-directory: ./AppMovil
      run: npm install

    # cap sync regenera los proyectos generados que estan en .gitignore
    # (capacitor-cordova-android-plugins, capacitor.settings.gradle, etc.) y
    # copia la carpeta web (www) hacia los assets nativos de Android.
    - name: Sync Capacitor (Android)
      working-directory: ./AppMovil
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      working-directory: ./AppMovil/android
      run: chmod +x gradlew

    - name: Build APK with Gradle
      working-directory: ./AppMovil/android
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lavanderia-App-v2
        path: AppMovil/android/app/build/outputs/apk/debug/app-debug.apk
