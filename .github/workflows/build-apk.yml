name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths:
      - 'AppMovil/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Necesario para que el workflow pueda crear Releases con el APK adjunto.
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    # Capacitor enlaza los modulos nativos de Android desde node_modules
    # (ver AppMovil/android/capacitor.settings.gradle). Sin este paso Gradle
    # falla con "Configuring project ':capacitor-android' without an existing
    # directory". node_modules esta en .gitignore, asi que hay que instalarlo.
    - name: Install npm dependencies (Capacitor)
      working-directory: ./AppMovil
      run: npm install

    # Marca la version del bundle en el codigo web ANTES de cap sync, para que
    # tanto el APK (bundle de fabrica) como el bundle OTA lleven la misma version.
    # updater.js compara esta version contra el manifiesto para decidir si baja
    # una actualizacion.
    - name: Inyectar version del bundle (OTA)
      working-directory: ./AppMovil
      run: |
        echo "window.__APP_BUNDLE_VERSION__ = '1.0.${{ github.run_number }}';" > www/js/version.js
        cp www/js/version.js js/version.js
        echo "version.js =>" && cat www/js/version.js

    # cap sync regenera los proyectos generados que estan en .gitignore
    # (capacitor-cordova-android-plugins, capacitor.settings.gradle, etc.) y
    # copia la carpeta web (www) hacia los assets nativos de Android.
    - name: Sync Capacitor (Android)
      working-directory: ./AppMovil
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      working-directory: ./AppMovil/android
      run: chmod +x gradlew

    - name: Build APK with Gradle
      working-directory: ./AppMovil/android
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lavanderia-App-v2
        path: AppMovil/android/app/build/outputs/apk/debug/app-debug.apk

    # Renombra el APK a un nombre amigable para la descarga del cliente.
    - name: Rename APK
      run: cp AppMovil/android/app/build/outputs/apk/debug/app-debug.apk ControlLavanderia-Movil.apk

    # Crea el bundle web OTA (zip del contenido de www) y el manifiesto que la
    # app consulta para detectar nuevas versiones. La URL /releases/latest/...
    # siempre apunta al ultimo Release publicado, asi que es estable.
    - name: Crear bundle OTA y manifiesto
      run: |
        ( cd AppMovil/www && zip -r ../../bundle.zip . >/dev/null )
        printf '{"version":"1.0.%s","url":"https://github.com/Datnya/controlavander-a/releases/latest/download/bundle.zip"}\n' "${{ github.run_number }}" > mobile-update.json
        echo "manifest =>" && cat mobile-update.json
        ls -la bundle.zip mobile-update.json

    # Publica un Release con link de descarga PERMANENTE y PUBLICO (el cliente
    # no necesita cuenta ni token de GitHub para bajar el instalador). La
    # activacion por licencia sigue protegiendo la app: descargarla no la activa.
    # Adjunta tambien el bundle OTA y el manifiesto para las actualizaciones.
    - name: Publicar Release (APK + bundle OTA)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: movil-v1.0.${{ github.run_number }}
        name: Control de Lavanderia - Movil (build ${{ github.run_number }})
        body: |
          APK de la aplicacion movil Control de Lavanderia.
          Descarga el archivo ControlLavanderia-Movil.apk e instalalo en el celular.
          La app requiere activacion con un codigo de licencia valido.

          Las apps ya instaladas (con motor OTA) se actualizan solas a esta version.
        files: |
          ControlLavanderia-Movil.apk
          bundle.zip
          mobile-update.json
        make_latest: true
