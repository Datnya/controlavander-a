name: Build Windows App (PC)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'forge.config.js'
      - 'package.json'
      - '.github/workflows/build-pc.yml'

jobs:
  build:
    runs-on: windows-latest

    # Token (fino, limitado a controlavander-pc) para publicar los instaladores.
    # Mientras no exista el secret, el paso de publicacion se omite y el build
    # sigue funcionando (solo sube el artifact).
    env:
      PC_TOKEN: ${{ secrets.PC_RELEASE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instala dependencias (incluye better-sqlite3, modulo nativo).
      - name: Install dependencies
        run: npm install

      # electron-forge make: reconstruye los modulos nativos para Electron y
      # genera el instalador Squirrel (Setup.exe + RELEASES + .nupkg) en out/make.
      - name: Build installer (electron-forge make)
        run: npm run make

      - name: List build output
        run: Get-ChildItem -Recurse out/make | Select-Object FullName, Length
        shell: pwsh

      - name: Read app version
        id: ver
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "App version: $V"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControlLavanderia-PC
          path: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/squirrel.windows/x64/RELEASES

      # Publica los archivos Squirrel en el repo publico separado de PC. Esto
      # alimenta el auto-updater de Electron (update.electronjs.org lee RELEASES).
      # Se omite automaticamente si todavia no esta configurado el secret.
      - name: Publicar instalador PC (auto-update)
        if: ${{ env.PC_TOKEN != '' }}
        uses: softprops/action-gh-release@v2
        with:
          repository: Datnya/controlavander-pc
          token: ${{ secrets.PC_RELEASE_TOKEN }}
          tag_name: v${{ steps.ver.outputs.version }}
          name: Control de Lavanderia PC v${{ steps.ver.outputs.version }}
          body: |
            Instalador de escritorio (Windows) de Control de Lavanderia.
            Instala ControlLavanderia-Setup.exe. Las versiones ya instaladas se
            actualizan solas a esta version al abrir la app.
          files: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/squirrel.windows/x64/RELEASES
          make_latest: true
